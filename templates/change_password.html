{% extends 'base.html' %}

{% block title %}修改密码 - 智能快递柜系统{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="page-header">
        <h2>🔑 修改密码</h2>
        <div class="header-actions">
            <a href="{{ url_for('admin') }}" class="btn btn-small btn-secondary">← 返回后台</a>
        </div>
    </div>

    <div class="change-pwd-card">
        <div class="change-pwd-info">
            <p>当前账号：<strong>{{ session.get('admin_username') }}</strong></p>
            <p class="change-pwd-tip">新密码至少6位，建议包含字母与数字组合</p>
        </div>

        <form method="POST" action="{{ url_for('change_password') }}" class="change-pwd-form">
            <div class="form-field">
                <label for="old_password">原密码</label>
                <input type="password" id="old_password" name="old_password"
                       placeholder="请输入原密码" required autocomplete="current-password">
            </div>
            <div class="form-field">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password"
                       placeholder="至少6位新密码" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-field">
                <label for="confirm_password">确认新密码</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="再次输入新密码" required minlength="6" autocomplete="new-password">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-green">💾 保存密码</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
