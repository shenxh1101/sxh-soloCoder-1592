<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 智能快递柜系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🔐</div>
            <h2>管理员登录</h2>
            <p class="login-subtitle">智能快递柜管理系统</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入管理员用户名" value="admin">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码" value="admin123">
                </div>
                <button type="submit" class="btn btn-primary btn-login">登 录</button>
            </form>

            <div class="login-tip">
                <p>💡 默认账号：admin / admin123</p>
            </div>

            <div class="back-home">
                <a href="{{ url_for('index') }}">← 返回首页</a>
            </div>
        </div>
    </div>
</body>
</html>
