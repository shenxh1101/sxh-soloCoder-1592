<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}智能快递柜系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📦 智能快递柜系统</h1>
            <nav class="nav">
                <a href="{{ url_for('index') }}">首页</a>
                <a href="{{ url_for('store_package') }}">存件</a>
                <a href="{{ url_for('pickup_package') }}">取件</a>
                <a href="{{ url_for('admin') }}">管理后台</a>
                <a href="{{ url_for('report') }}">统计报表</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <main class="main">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <p>&copy; 2026 智能快递柜系统</p>
        </footer>
    </div>
</body>
</html>
